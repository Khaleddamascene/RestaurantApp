<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suosikit — Opiskelijaravintolat</title>

  <link rel="stylesheet" href="../styles/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script type="module" src="../JS/favorites.js"></script>



</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <div class="header__content">
    <h1>
      <a href="index.html" style="color:inherit;text-decoration:none;">
        Opiskelijaravintolat
      </a>
    </h1>

    <div class="header__actions">
      <span id="userNameDisplay"></span>

      <div id="userMenu" class="user-menu hidden">
        <img id="profileAvatarBtn" class="avatar-btn" alt="Profiili" />
        <div id="userDropdown" class="user-dropdown hidden">
          <button id="goProfileBtn">👤 Oma profiili</button>
          <button id="goFavoritesBtn">★ Suosikit</button>
          <button id="logoutBtn">🚪 Kirjaudu ulos</button>
        </div>
      </div>

      <button id="showLoginBtn" class="btn btn--ghost">Kirjaudu</button>
    </div>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main class="page-wrapper">

  <!-- NOT LOGGED IN -->
  <div id="notLoggedIn" class="not-logged-in hidden">
    <span class="not-logged-in__icon">🔒</span>
    <h2>Kirjaudu sisään</h2>
    <p>Nähdäksesi suosikkiravintolaasi, sinun täytyy kirjautua ensin sisään.</p>
    <a href="index.html" class="btn btn--primary">← Takaisin etusivulle</a>
  </div>

  <!-- LOGGED IN CONTENT -->
  <div id="favoritesContent" class="hidden">

    <div class="favorites-hero">
      <h2>Omat <span>suosikit</span></h2>
      <p class="favorites-count" id="favCount"></p>
    </div>

    <div class="favorites-grid" id="favoritesGrid"></div>

  </div>

</main>

<!-- ================= AUTH MODAL ================= -->
<div id="authModal" class="modal hidden">
  <div class="modal__content">
    <button id="closeAuthModalBtn" class="modal__close" type="button">×</button>
   
    <div class="auth-grid">
      <section class="panel">
        <h2>Kirjaudu sisään</h2>
        <form id="loginForm" class="form-grid">
          <label class="field">
            <span>Sähköposti</span>
            <input id="loginEmail" type="email" required />
          </label>
          <label class="field">
            <span>Salasana</span>
            <input id="loginPassword" type="password" required />
          </label>
            <button id="showLoginBtn" class="btn btn--ghost">Kirjaudu</button>
          <button class="btn" type="submit">Kirjaudu</button>
          <p id="loginMessage" class="message"></p>
        </form>
      </section>
    </div>
  </div>
</div>


</body>
</html>
