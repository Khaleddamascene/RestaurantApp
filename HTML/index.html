<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Student Lunch Finder</title>
    <link rel="stylesheet" href="/CSS/styles.css">
</head>
<body>

<header>
    <h1>🍽️ Student Lunch Finder</h1>
    <div class="header-actions">
        <input type="text" placeholder="Hae ravintolaa...">
        <button>Kirjaudu</button>
    </div>
</header>

<main>
    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Ravintolat</h2>

        <select>
            <option>Kaikki kaupungit</option>
            <option>Helsinki</option>
            <option>Espoo</option>
        </select>

        <ul class="restaurant-list">
            <li>Unicafe</li>
            <li>Sodexo</li>
            <li>Fazer</li>
        </ul>
    </aside>

    <!-- Content -->
    <section class="content">
        <div class="restaurant-header">
            <h2>Valitse ravintola</h2>
            <div class="menu-buttons">
                <button>Tänään</button>
                <button>Tämä viikko</button>
            </div>
        </div>

        <div class="menu-container">
            <div class="menu-card">
                <h3>Pasta Bolognese</h3>
                <p>Naudanliha, tomaatti</p>
                <span class="price">2.95€</span>
            </div>

            <div class="menu-card">
                <h3>Kasviskeitto</h3>
                <p>Vegaaninen</p>
                <span class="price">2.50€</span>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 Student Lunch Finder</p>
</footer>

</body>
</html>
