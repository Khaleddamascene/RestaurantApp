<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opiskelijaravintolat</title>

  <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

  <!-- TÄRKEÄ: module -->
  <script type="module" src="../JS/app.js"></script>
  <script type="module" src="../JS/auth.js"></script>



</head>

<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header__content">
      <h1>Opiskelijaravintolat ja ruokalistat</h1>

      <div class="header__actions">
        <button id="showLoginBtn" class="btn btn--ghost">Kirjaudu</button>
        <button id="showRegisterBtn" class="btn btn--ghost">Rekisteröidy</button>
        <button id="logoutBtn" class="btn btn--danger hidden">Kirjaudu ulos</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- FILTERIT -->
      <section class="panel">
        <div class="panel__header">
          <h2>Suodattimet</h2>
        </div>

        <label class="field">
          <span>Näkymä</span>
          <select id="menuView">
            <option value="today">Päivän ruokalista</option>
            <option value="week">Viikon ruokalista</option>
          </select>
        </label>

        <label class="field">
          <span>Kaupunki</span>
          <select id="cityFilter">
            <option value="all">Kaikki kaupungit</option>
          </select>
        </label>

        <label class="field">
          <span>Palveluntarjoaja</span>
          <select id="providerFilter">
            <option value="all">Kaikki tarjoajat</option>
          </select>
        </label>
      </section>

      <!-- RAVINTOLAT -->
      <section class="panel">
        <h2>Ravintolat</h2>
        <div id="restaurantList" class="restaurant-list"></div>
        <div class="panel__header">
  
        </div>
       
      </section>

    </aside>

    <!-- CONTENT -->
    <section class="content">

      <!-- USER PANEL -->
      <section id="userPanel" class="panel hidden">
         <div id="restaurantList" class="restaurant-list"></div>
        <div class="panel__header">
          <h2>Omat tiedot</h2>
        </div>

        <div class="user-card">
          <img id="profilePreview" class="profile-preview" alt="Profiilikuva" />
          <div>
            <p><strong id="currentUserName"></strong></p>
            <p id="currentUserEmail" class="muted"></p>
            <p id="favoriteRestaurantText" class="muted"></p>
          </div>
        </div>

        <form id="profileForm" class="form-grid">
          <label class="field">
            <span>Nimi</span>
            <input id="profileName" type="text" />
          </label>

          <label class="field">
            <span>Sähköposti</span>
            <input id="profileEmail" type="email" />
          </label>

          <label class="field">
            <span>Profiilikuva</span>
            <input id="profileImage" type="file" accept="image/*" />
          </label>

          <button class="btn" type="submit">Päivitä tiedot</button>
          <p id="profileMessage" class="message"></p>
        </form>
      </section>

      <!-- MENU -->
      <section class="panel">
        <div class="panel__header">
          <h2 id="menuTitle">Ruokalista</h2>
          <p id="menuSubtitle" class="muted">
            Valitse ravintola nähdäksesi ruokalistan.
          </p>
        </div>

        <article id="menuPanel" class="menu-panel">
          <p class="muted">Ruokalista latautuu tähän.</p>
        </article>
      </section>

      <!-- KARTTA -->
      <section class="panel">
        <div class="panel__header">
          <h2>Kartta</h2>
          <p class="muted">
            Karttanäkymä voidaan lisätä tähän (Leaflet).
          </p>
        </div>

        <div id="mapPanel" class="map-panel"></div>
      
      </section>

    </section>
  </main>

  <!-- TEMPLATE -->
  <template id="restaurantTemplate">
    <div class="restaurant-card">
      <div>
        <h3 class="restaurant-name"></h3>
        <p class="restaurant-meta"></p>
        <p class="restaurant-extra muted"></p>
      </div>

      <div class="restaurant-actions">
        <span class="badge">Avaa</span>
        <button class="favorite-btn" type="button">★</button>
      </div>
    </div>
  </template>

  <!-- AUTH MODAL -->
  <div id="authModal" class="modal hidden">
    <div class="modal__content">
      <button id="closeAuthModalBtn" class="modal__close">×</button>

      <div class="auth-grid">

        <!-- LOGIN -->
        <section class="panel">
          <h2>Kirjaudu sisään</h2>
          <form id="loginForm" class="form-grid">
            <label class="field">
              <span>Sähköposti</span>
              <input id="loginEmail" type="email" required />
            </label>

            <label class="field">
              <span>Salasana</span>
              <input id="loginPassword" type="password" required />
            </label>

            <button class="btn">Kirjaudu</button>
            <p id="loginMessage" class="message"></p>
          </form>
        </section>

        <!-- REGISTER -->
        <section class="panel">
          <h2>Rekisteröidy</h2>
          <form id="registerForm" class="form-grid">
            <label class="field">
              <span>Nimi</span>
              <input id="registerName" type="text" required />
            </label>

            <label class="field">
              <span>Sähköposti</span>
              <input id="registerEmail" type="email" required />
            </label>

            <label class="field">
              <span>Salasana</span>
              <input id="registerPassword" type="password" required minlength="4" />
            </label>

            <label class="field">
              <span>Vahvista salasana</span>
              <input id="registerPasswordConfirm" type="password" required minlength="4" />
            </label>

            <button class="btn">Rekisteröidy</button>
            <p id="registerMessage" class="message"></p>
          </form>
        </section>

      </div>
    </div>
  </div>

</body>
</html>
